<!doctype html>
<html>
  <head>

    <title>WhisperStash</title>

      button { width: 100%; margin-top: 8px; padding: 8px; }

      .hint { font-size: 12px; color: #555; margin-top: 6px; }
      input { width: 100%; box-sizing: border-box; margin-top: 8px; padding: 6px; }
    </style>

  <body>
    <h3>WhisperStash</h3>

    <div class="hint">Run: <code>python3 whisperstash.py server</code></div>
